services:
  booking-manager:
    build: .
    container_name: atrani-booking-manager
    ports:
      - "3002:3001"  # API доступен на порту 3002 (3001 был занят)
    volumes:
      # База данных персистентна (сохраняется между перезапусками)
      - ./backend/database:/app/backend/database
      # Конфиг тоже можно редактировать снаружи
      - ./backend/config:/app/backend/config
      # Логи (если будут)
      - ./logs:/app/logs
    environment:
      - NODE_ENV=production
      - PORT=3001
      - TZ=Europe/Rome
    restart: unless-stopped
    networks:
      - booking-network
    # Автосинк календарей каждый час через cron в контейнере
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Опциональный nginx для фронтенда (если нужен отдельный веб-сервер)
  frontend:
    image: nginx:alpine
    container_name: atrani-booking-frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend/public:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - booking-manager
    restart: unless-stopped
    networks:
      - booking-network

  # Cron для автосинхронизации
  sync-cron:
    build: .
    container_name: atrani-booking-sync
    volumes:
      - ./backend/database:/app/backend/database
      - ./backend/config:/app/backend/config
    environment:
      - TZ=Europe/Rome
    restart: unless-stopped
    networks:
      - booking-network
    # Запускаем синхронизацию каждый час
    entrypoint: >
      sh -c "
      echo '0 * * * * cd /app && node backend/src/sync-calendars.js >> /app/logs/sync.log 2>&1' > /etc/crontabs/root &&
      crond -f -l 2
      "
    depends_on:
      - booking-manager

  # Telegram bot для семейного чата
  telegram-bot:
    build:
      context: ./telegram-bot
      dockerfile: Dockerfile
    container_name: atrani-telegram-bot
    environment:
      - TELEGRAM_BOT_TOKEN=REDACTED_BOT_TOKEN
      - FAMILY_CHAT_ID=REDACTED_CHAT_ID
      - BOOKING_API_URL=http://booking-manager:3001/api
      - OPENCLAW_API_URL=http://host.docker.internal:18789
      - OPENCLAW_TOKEN=REDACTED_OPENCLAW_TOKEN
      - TZ=Europe/Rome
    restart: unless-stopped
    networks:
      - booking-network
    depends_on:
      - booking-manager
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  booking-network:
    driver: bridge
